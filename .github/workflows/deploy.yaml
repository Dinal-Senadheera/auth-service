name: Build, Push, and Deploy to EKS

on:
  push:
    branches:
      - auth-test

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/ctse-assignment-as:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/ctse-assignment-as:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.27.2'

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region eu-north-1 --name course-microservices-cluster

      - name: Create Kubernetes secrets
        run: |
          kubectl create secret generic auth-secrets \
            --from-literal=GOOGLE_CLIENT_ID='${{ secrets.GOOGLE_CLIENT_ID }}' \
            --from-literal=GOOGLE_CLIENT_SECRET='${{ secrets.GOOGLE_CLIENT_SECRET }}' \
            --from-literal=API_BASE_URL='${{ secrets.API_BASE_URL }}' \
            --from-literal=JWT_SECRET='${{ secrets.JWT_SECRET }}' \
            -n ctse-microservices \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes Deployment
        run: |
          kubectl apply -f k8s.yaml

      - name: Verify Deployment
        run: |
          kubectl rollout restart deployment/auth-deploy -n ctse-microservices
          kubectl rollout status deployment/auth-deploy -n ctse-microservices
          kubectl get pods -n ctse-microservices
          kubectl get svc -n ctse-microservices
